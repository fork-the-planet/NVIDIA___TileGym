# Pre-commit hooks for TileGym.
#
# Run locally with `bash format.sh` (which installs and runs these hooks), or
# directly with `pre-commit run --all-files`. CI runs these hooks on the files
# changed by each pull request (see .github/workflows/tilegym-ci-infra-tests.yml).
#
# *.sig files (Sigstore bundles) are excluded from modifying hooks to prevent
# spurious changes to signed artifacts — their content is managed by /nvskills-ci.
# evals/evals.json files are excluded from pretty-format-json to preserve the
# canonical key ordering (id, question, expected_skill, ...) and literal
# non-ASCII characters (e.g. em-dashes) consistent with the NVIDIA/skills ecosystem.
# check-json still validates them for correctness.

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v3.3.0
  hooks:
  - id: trailing-whitespace
    exclude: '\.patch$|\.sig$'
  - id: end-of-file-fixer
    exclude: '\.patch$|\.sig$'
  - id: check-yaml
  - id: check-added-large-files
    exclude: '\.patch$'
  - id: check-json
  - id: pretty-format-json
    args: ['--autofix', '--indent=2']
    exclude: '/evals/evals\.json$|\.sig$'

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.9
  hooks:
    - id: ruff-check
      name: ruff-lint
      args: [--fix]
      types_or: [python]
      exclude: '\.patch$'
    - id: ruff-format
      name: ruff-format
      types_or: [python]
      exclude: '\.patch$'
